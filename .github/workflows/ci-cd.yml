name: ci-cd-back

# Build, test, scan, and deploy the LiveMenu backend.
# Deployment to Cloud Run is gated on:
#   1. Tests (pytest) passing.
#   2. Trivy reporting zero HIGH/CRITICAL vulnerabilities (Entrega 2 §5).
#
# GCP authentication uses Workload Identity Federation — no long-lived JSON
# keys are stored in GitHub. Configure these repository variables / secrets:
#   * vars.GCP_PROJECT_ID
#   * vars.GCP_REGION                  (e.g. us-central1)
#   * vars.GCP_AR_REPO                 (e.g. livemenu-abc)
#   * vars.GCP_API_SERVICE             (e.g. livemenu-api-abc)
#   * secrets.GCP_WIF_PROVIDER         (full provider resource name)
#   * secrets.GCP_DEPLOYER_SA          (livemenu-deployer-<suffix>@…)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write       # required for Workload Identity Federation
  pull-requests: write  # so trivy can comment scan summary on PRs

env:
  IMAGE_NAME: api

jobs:
  # ─────────────────────────────────────────────────────────────────────
  test:
    name: Lint & test
    runs-on: ubuntu-latest

    # Integration tests in conftest.py talk to a real Postgres. We spin up a
    # disposable container in the runner and create the empty test database
    # before pytest runs.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: livemenu
          POSTGRES_PASSWORD: livemenu
          POSTGRES_DB: livemenu_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check . --output-format=github

      - name: Pytest with coverage
        env:
          PYTHONPATH: ${{ github.workspace }}/api
          # Override the conftest URL so it points at the GitHub-Actions
          # Postgres service (host=localhost, port=5432).
          DATABASE_URL: postgresql+asyncpg://livemenu:livemenu@localhost:5432/livemenu_test
        run: pytest --cov=app --cov-report=term --cov-fail-under=60

  # ─────────────────────────────────────────────────────────────────────
  build-scan:
    name: Build image + Trivy scan
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_tag: ${{ steps.meta.outputs.short_sha }}
    steps:
      - uses: actions/checkout@v4

      - id: meta
        run: echo "short_sha=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Build (load locally for scanning)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          tags: livemenu-api:${{ steps.meta.outputs.short_sha }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Two Trivy passes:
      #   1. ``--exit-code 1 --severity HIGH,CRITICAL`` blocks the pipeline.
      #   2. SARIF upload → Security tab in GitHub for triage.
      - name: Trivy — gating scan (HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: livemenu-api:${{ steps.meta.outputs.short_sha }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          vuln-type: os,library
          exit-code: "1"
          format: table

      - name: Trivy — full SARIF report
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: livemenu-api:${{ steps.meta.outputs.short_sha }}
          format: sarif
          output: trivy-results.sarif
          ignore-unfixed: true
          vuln-type: os,library

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-back

  # ─────────────────────────────────────────────────────────────────────
  deploy:
    name: Push & deploy
    runs-on: ubuntu-latest
    needs: build-scan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - id: auth
        name: Auth to GCP via Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SA }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - uses: docker/setup-buildx-action@v3

      - name: Build & push (multi-arch not needed; Cloud Run = linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_AR_REPO }}/api:${{ needs.build-scan.outputs.image_tag }}
            ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_AR_REPO }}/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy a new Cloud Run revision
        run: |
          gcloud run deploy ${{ vars.GCP_API_SERVICE }} \
            --image=${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_AR_REPO }}/api:${{ needs.build-scan.outputs.image_tag }} \
            --region=${{ vars.GCP_REGION }} \
            --quiet
