version: '3.8'

# ─────────────────────────────────────────────────────────────
# LiveMenu – production-ready compose
# Run:  docker compose up -d --build
# Certs: ./generate-certs.sh  (first time only)
# ─────────────────────────────────────────────────────────────

services:
  # ── PostgreSQL ──────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: livemenu-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-livemenu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-livemenu}
      POSTGRES_DB: ${POSTGRES_DB:-livemenu}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [backend]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-livemenu}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-compatible object storage) ────────────────────
  minio:
    image: minio/minio:latest
    container_name: livemenu-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    networks: [backend]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI backend ─────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: livemenu-api
    restart: unless-stopped
    depends_on:
      db:    { condition: service_healthy }
      minio: { condition: service_started }
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_NAME: livemenu-api
      DEBUG: "false"
      CORS_ORIGINS: '["https://localhost"]'
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-livemenu}:${POSTGRES_PASSWORD:-livemenu}@db:5432/${POSTGRES_DB:-livemenu}"
      PYTHONPATH: "/app/api"
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_ACCESS_TTL_MIN: ${JWT_ACCESS_TTL_MIN:-15}
      JWT_REFRESH_TTL_DAYS: ${JWT_REFRESH_TTL_DAYS:-7}
      IP_HASH_SALT: ${IP_HASH_SALT:-change-me-random-salt}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-100}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ENABLE_DOCS: ${ENABLE_DOCS:-false}
      S3_ENDPOINT: "http://minio:9000"
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-livemenu}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-http://localhost:9000/livemenu}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://localhost}
    networks: [backend]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/auth/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── React frontend ──────────────────────────────────────────
  frontend:
    build:
      context: ../Proyecto-1---Front
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://localhost/api/v1}
    container_name: livemenu-frontend
    restart: unless-stopped
    networks: [backend]

  # ── Nginx reverse-proxy (TLS termination) ───────────────────
  nginx:
    image: nginx:1.27-alpine-slim
    container_name: livemenu-nginx
    restart: unless-stopped
    depends_on: [api, frontend]
    ports:
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks: [backend]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- https://localhost/api/v1/auth/health --no-check-certificate || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  minio_data:

networks:
  backend:
    driver: bridge
