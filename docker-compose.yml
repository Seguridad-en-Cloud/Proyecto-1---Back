# Local development stack. Production runs on Cloud Run + Cloud SQL +
# Cloud Storage + Secret Manager (see infra/terraform/ in the repo root).
#
# Note: this file is for *development only*. Secrets here are dummy values
# that match what `.env.example` ships; never copy them into production.

services:
  db:
    image: postgres:16-alpine
    container_name: livemenu-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-livemenu}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-livemenu}
      POSTGRES_DB: ${DB_NAME:-livemenu}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-livemenu}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: livemenu-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    # Pull values from a local .env file (see .env.example). docker-compose
    # auto-loads ./.env, which keeps secrets out of this manifest entirely.
    env_file:
      - .env
    environment:
      # Hard overrides specific to docker-compose networking. Anything else
      # comes from .env so we don't duplicate values.
      DATABASE_URL: "postgresql+asyncpg://${DB_USER:-livemenu}:${DB_PASSWORD:-livemenu}@db:5432/${DB_NAME:-livemenu}"
      PYTHONPATH: "/app/api"
      STORAGE_BACKEND: "s3"
      S3_ENDPOINT: "http://minio:9000"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/v1/auth/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: livemenu-nginx
    restart: unless-stopped
    depends_on:
      - api
      - frontend
    ports:
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - backend

  frontend:
    build:
      context: ../Proyecto-1---Front
      dockerfile: Dockerfile
    container_name: livemenu-frontend
    networks:
      - backend
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: livemenu-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  minio_data:

networks:
  backend:
    driver: bridge
