version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: livemenu-db
    environment:
      POSTGRES_USER: livemenu
      POSTGRES_PASSWORD: livemenu
      POSTGRES_DB: livemenu
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U livemenu"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: livemenu-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: dev
      APP_NAME: livemenu-api
      DEBUG: "false"
      CORS_ORIGINS: "[\"http://localhost:3000\",\"http://localhost:5173\"]"
      DATABASE_URL: "postgresql+asyncpg://livemenu:livemenu@db:5432/livemenu"
      PYTHONPATH: "/app/api"
      JWT_SECRET: "change-me-in-production-to-a-strong-secret"
      JWT_ACCESS_TTL_MIN: 15
      JWT_REFRESH_TTL_DAYS: 7
      IP_HASH_SALT: "change-me-too-random-salt"
      RATE_LIMIT_PER_MINUTE: 100
      LOG_LEVEL: INFO
      ENABLE_DOCS: "true"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/auth/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: livemenu-nginx
    depends_on:
      - api
    ports:
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - backend

volumes:
  postgres_data:

networks:
  backend:
    driver: bridge
